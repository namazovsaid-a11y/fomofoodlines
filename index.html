<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOMO Food Lines</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #ffffff;
}

/* HEADER */
header {
  padding: 20px 10%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #ffffff;
  border-bottom: 1px solid #eeeeee;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  color: #0b6e4f;
  text-decoration: none;
}

.logo span {
  color: #c5a059;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #333333;
  font-weight: bold;
}

/* HERO SECTION */
.hero-container {
  display: flex;
  background: #f4f7f5;
  padding: 50px 10%;
  align-items: center;
}

.hero-left {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.hero-box {
  background: white;
  border: 1px solid #dddddd;
  padding: 15px;
  text-align: center;
  border-radius: 5px;
}

.hero-box img {
  max-width: 80px;
  height: auto;
}

.hero-right {
  flex: 1;
  padding-left: 50px;
}

.hero-right h1 {
  font-size: 38px;
  color: #0b6e4f;
}

/* SECTIONS */
section {
  padding: 60px 10%;
}

h2 {
  color: #0b6e4f;
  font-size: 28px;
  margin-bottom: 20px;
}

/* BRANDS */
.brands-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  text-align: center;
}

.brand-card {
  background: #ffffff;
  border: 1px solid #eeeeee;
  padding: 20px;
  border-radius: 5px;
}

.brand-card img {
  max-width: 90px;
  height: 40px;
  object-fit: contain;
}

.brand-card h4 {
  margin: 10px 0 0 0;
  color: #333;
}

/* PAGINATION */
.pages {
  text-align: center;
  margin-top: 30px;
}

.page-link {
  display: inline-block;
  padding: 8px 16px;
  margin: 0 5px;
  border: 1px solid #0b6e4f;
  color: #0b6e4f;
  text-decoration: none;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
}

.page-link:hover {
  background: #0b6e4f;
  color: white;
}

/* ADVANTAGES */
.adv-window {
  background: #0b6e4f;
  color: white;
  padding: 40px;
  border-radius: 10px;
}

.adv-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}

.adv-item {
  font-size: 20px;
  font-weight: bold;
}

  text-align: center;
  font-size: 22px;
}
